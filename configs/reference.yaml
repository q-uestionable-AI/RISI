# Public reference for the immutable profile implemented in risi.operator.safety.
# Run manifests request values within these ceilings; this file is not itself an authority source.
schema_version: 1
profile: local-reference
registered:
  adapter: reference
  decision_providers:
    - deterministic-approval
    - deterministic-obligation
  memory_policy: pure-read
capabilities:
  - scenario.read
  - artifact.write
  - reference.execute
  - evidence.verify
ceilings:
  episodes: 1
  retrieval_calls: 8
  logical_steps: 100
  input_bytes: 1000000
  memory_records: 1000
  artifact_bytes: 20000000
denied:
  network: true
  subprocesses: true
  credentials: true
  dynamic_plugins: true
  memory_writes: true
